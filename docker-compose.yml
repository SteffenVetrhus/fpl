services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - FPL_LEAGUE_ID=${FPL_LEAGUE_ID}
      - FPL_API_BASE_URL=${FPL_API_BASE_URL:-https://fantasy.premierleague.com/api}
      - ENABLE_API_CACHE=${ENABLE_API_CACHE:-true}
      - API_CACHE_DURATION=${API_CACHE_DURATION:-300}
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_PUBLIC_URL=${POCKETBASE_PUBLIC_URL:-http://localhost:8090}
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper-fpl:
    build:
      context: ./scrapers
    command: ["python", "-m", "src.run_fpl"]
    environment:
      - PB_URL=http://pocketbase:8090
      - PB_USER=${PB_ADMIN_EMAIL}
      - PB_PASS=${PB_ADMIN_PASSWORD}
      - FPL_API_BASE_URL=${FPL_API_BASE_URL:-https://fantasy.premierleague.com/api}
    depends_on:
      pocketbase:
        condition: service_healthy
    profiles:
      - scraper

  scraper-understat:
    build:
      context: ./scrapers
    command: ["python", "-m", "src.run_understat"]
    environment:
      - PB_URL=http://pocketbase:8090
      - PB_USER=${PB_ADMIN_EMAIL}
      - PB_PASS=${PB_ADMIN_PASSWORD}
      - FPL_API_BASE_URL=${FPL_API_BASE_URL:-https://fantasy.premierleague.com/api}
    depends_on:
      pocketbase:
        condition: service_healthy
    profiles:
      - scraper

  scraper-fbref:
    build:
      context: ./scrapers
    command: ["python", "-m", "src.run_fbref"]
    environment:
      - PB_URL=http://pocketbase:8090
      - PB_USER=${PB_ADMIN_EMAIL}
      - PB_PASS=${PB_ADMIN_PASSWORD}
      - FPL_API_BASE_URL=${FPL_API_BASE_URL:-https://fantasy.premierleague.com/api}
    depends_on:
      pocketbase:
        condition: service_healthy
    profiles:
      - scraper

volumes:
  pb_data:

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - FPL_LEAGUE_ID=${FPL_LEAGUE_ID}
      - FPL_API_BASE_URL=${FPL_API_BASE_URL:-https://fantasy.premierleague.com/api}
      - ENABLE_API_CACHE=${ENABLE_API_CACHE:-true}
      - API_CACHE_DURATION=${API_CACHE_DURATION:-300}
      - FPL_MANAGER_ID=${FPL_MANAGER_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
